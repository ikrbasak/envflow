version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
      dev-deps-major:
        dependency-type: development
        update-types:
          - major
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
